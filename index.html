<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebApps</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#f8fafc; --muted:#94a3b8; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100vh; display:grid; place-items:center;
           background:var(--bg); color:var(--text);
           font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
    .wrap { width:min(560px,90vw); padding:2rem; }
    h1 { font-size:1.6rem; margin-bottom:0.25rem; }
    .subtitle { color:var(--muted); margin-bottom:1.5rem; }
    .app { display:block; padding:1rem 1.25rem; margin-bottom:0.75rem;
           background:var(--card); border-radius:12px; text-decoration:none;
           color:var(--text); transition:transform 0.1s ease; }
    .app:hover { transform:translateY(-2px); }
    .app strong { color:var(--accent); }
    .app span { display:block; color:var(--muted); font-size:0.85rem; margin-top:0.2rem; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>WebApps</h1>
    <p class="subtitle">웹앱 모음</p>

    <a class="app" href="./myapp/">
      <strong>myapp →</strong>
      <span>Hello World PWA · 아이폰 설치 + 로컬 알림</span>
    </a>
  </main>
</body>
</html>
